<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Portal ciudadano V1.1</title><link rel="stylesheet" href="./css/app.css"></head>
<body><main><header><h1 id="institution-name">Portal ciudadano</h1><p class="muted">V1.1 segura: el código de seguimiento se muestra una sola vez.</p></header>
<section><h2>Crear reporte</h2><div id="create-message" aria-live="polite"></div><form id="create-ticket-form"><label>Categoría<select id="category" required></select></label><label>Sector<select id="sector"></select></label><fieldset><legend>Ubicación</legend><button id="use-current-location" type="button">Usar mi ubicación actual</button><p id="location-status" class="muted" aria-live="polite">Puedes solicitar GPS real del navegador o escribir una dirección.</p><label>Dirección o referencia escrita<input id="location" maxlength="280" autocomplete="off"></label></fieldset><label>Descripción<textarea id="description" required minlength="5" maxlength="2000"></textarea></label><label>Fotografía de evidencia<input id="evidence" type="file" accept="image/jpeg,image/png,image/webp"></label><p id="evidence-status" class="muted" aria-live="polite">Selecciona una fotografía para validar Storage. Si falta autorización, el reporte se creará sin adjunto.</p><button id="create-button" type="submit">Crear reporte</button></form></section>
<section><h2>Consultar reporte</h2><div id="lookup-message" aria-live="polite"></div><form id="lookup-ticket-form"><label>Identificador público<input id="public-id" required minlength="36" maxlength="36" autocomplete="off"></label><label>Código de seguimiento<input id="tracking-secret" required minlength="32" maxlength="128" autocomplete="off"></label><button id="lookup-button" type="submit">Consultar</button></form></section>
</main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1"></script><script src="./js/config.local.js"></script><script type="module" src="./js/citizen.js"></script></body></html>
