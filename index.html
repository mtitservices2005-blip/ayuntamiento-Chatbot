<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Virtual | Ayuntamiento de Laguna Salada</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chatbot {
            width: 380px;
            height: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.15);
            overflow: au;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #075e54;
            color: white;
            padding: 20px;
        }

        .header h2 { 
            margin: 0 0 5px;
            font-size: 20px;
        }

        .header p {
            margin: 0;
            font-size: 14px;
            opacity: 0.9;
        }

         .chat-area {
    flex: 1;
    padding: 20px;
    background: #eef2f3;
    overflow-y: auto;
    min-height: 0;
}

        .message {
            background: white;
            padding: 12px 15px;
            border-radius: 15px 15px 15px 4px;
            max-width: 80%;
            line-height: 1.4;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        }

        .input-area {
            display: flex;
            padding: 12px;
            background: white;
            border-top: 1px solid #ddd;
        }

        .input-area input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 10px 15px;
            outline: none;
        }

        .input-area button {
            margin-left: 8px;
            border: none;
            background: #075e54;
            color: white;
            border-radius: 20px;
            padding: 10px 16px;
            cursor: pointer;
        }
        .user-message {
    background: #075e54;
    color: white;
    padding: 12px 15px;
    border-radius: 15px 15px 4px 15px;
    max-width: 75%;
    margin: 12px 0 12px auto;
    line-height: 1.4;
    box-shadow: 0 2px 5px rgba(0,0,0,0.08);
    word-wrap: break-word;
}
.quick-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 15px;
}

.quick-actions button {
    border: 1px solid #075e54;
    background: white;
    color: #075e54;
    border-radius: 18px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 13px;
    transition: 0.2s;
}

.quick-actions button:hover {
    background: #075e54;
    color: white;
}
.photo-options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 12px 0;
}

.photo-options button {
    border: 1px solid #075e54;
    background: white;
    color: #075e54;
    border-radius: 18px;
    padding: 9px 13px;
    cursor: pointer;
    font-size: 13px;
}

.photo-options button:hover {
    background: #075e54;
    color: white;
}

.image-message {
    padding: 5px;
    overflow: hidden;
}

.image-message img {
    display: block;
    width: 100%;
    max-width: 220px;
    max-height: 250px;
    object-fit: cover;
    border-radius: 10px;
}
.selection-options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 12px 0;
}

.selection-options button {
    border: 1px solid #075e54;
    background: white;
    color: #075e54;
    border-radius: 18px;
    padding: 9px 13px;
    cursor: pointer;
    font-size: 13px;
    transition: 0.2s;
}

.selection-options button:hover {
    background: #075e54;
    color: white;
}

.navigation-bar {
    padding: 6px 12px;
    background: #f5f5f5;
    border-top: 1px solid #ddd;
    text-align: center;
}

.navigation-bar button {
    background: transparent;
    border: 1px solid #075e54;
    color: #075e54;
    border-radius: 18px;
    padding: 7px 16px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
}

.navigation-bar button:hover {
    background: #075e54;
    color: white;
}

.lugar-card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    margin: 12px 0;
    max-width: 340px;
    box-shadow: 0 3px 12px rgba(0, 0, 0, 0.15);
}

.lugar-card img {
    width: 100%;
    height: 190px;
    object-fit: cover;
    display: block;
}

.lugar-card-content {
    padding: 14px;
}

.lugar-card-content h3 {
    margin: 0 0 8px;
    color: #075e54;
    font-size: 17px;
}

.lugar-card-content p {
    margin: 0;
    color: #444;
    font-size: 14px;
    line-height: 1.5;
}

    </style>
</head>

<body>

    <div class="chatbot">

        <div class="header">
            <h2>🏛️ Ayuntamiento de Laguna Salada</h2>
            <p>Asistente Virtual Municipal • En línea</p>
        </div>

        <div class="chat-area">

    <div class="message">
        👋 ¡Hola! Soy el asistente virtual del Ayuntamiento Municipal de Laguna Salada.
        <br><br>
        Puedo ayudarte con información municipal, servicios y atención ciudadana.
        <br><br>
        ¿En qué puedo ayudarte hoy?
    </div>

    <div class="quick-actions">
    <button onclick="preguntaRapida('Quiero conocer Laguna Salada')">🏛️ Conoce Laguna Salada</button>

    <button onclick="preguntaRapida('Quiero consultar los servicios municipales')">🏢 Servicios municipales</button>

    <button onclick="preguntaRapida('Quiero reportar un problema')">🚨 Reportar un problema</button>

    <button onclick="preguntaRapida('Quiero consultar mi ticket')">🎫 Consultar mi ticket</button>

    <button onclick="preguntaRapida('Quiero ver noticias y eventos')">📰 Noticias y eventos</button>

    <button onclick="preguntaRapida('¿Cómo puedo contactar con el Ayuntamiento?')">📞 Contacto</button>
</div>

</div>

<div class="navigation-bar">
    <button onclick="volverMenuPrincipal()">🏠 Menú principal</button>
</div>

        <div class="input-area">
            <input type="text" placeholder="Escribe tu pregunta...">
            <button>Enviar</button>
        </div>
<input
    type="file"
    id="fotoReporte"
    accept="image/*"
    style="display: none;"
>
    </div>
<script>
    const input = document.querySelector('.input-area input');
    const button = document.querySelector('.input-area button');
    const chatArea = document.querySelector('.chat-area');

    let esperandoSector = false;
    
    const sectoresLagunaSalada = [
    'San Antonio',
    'Puerto Rico',
    'La Curva',
    'Pueblo Nuevo',
    'Las Flores',
    'Alto de La Hicotea'
];
    let estadoReporte = null;
let fotoSeleccionada = null;

let datosReporte = {
    categoria: '',
    sector: '',
    ubicacion: '',
    descripcion: '',
    foto: false
};

    function agregarMensaje(texto, tipo) {
        const mensaje = document.createElement('div');

        if (tipo === 'usuario') {
            mensaje.classList.add('user-message');
        } else {
            mensaje.classList.add('message');
        }

        mensaje.textContent = texto;
        chatArea.appendChild(mensaje);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function preguntaRapida(pregunta) {
        input.value = pregunta;
        enviarMensaje();
    }
    function mostrarOpcionesFoto() {
    const opciones = document.createElement('div');
    opciones.classList.add('photo-options');

    const botonFoto = document.createElement('button');
    botonFoto.textContent = '📸 Adjuntar foto';

    const botonSinFoto = document.createElement('button');
    botonSinFoto.textContent = '⏭️ Continuar sin foto';

    botonFoto.addEventListener('click', function() {
        document.getElementById('fotoReporte').click();
    });

    botonSinFoto.addEventListener('click', function() {
        datosReporte.foto = false;
        generarTicket();
        opciones.remove();
    });

    opciones.appendChild(botonFoto);
    opciones.appendChild(botonSinFoto);

    chatArea.appendChild(opciones);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function mostrarImagenEnChat(archivo) {
    const lector = new FileReader();

    lector.onload = function(evento) {
        const contenedor = document.createElement('div');
        contenedor.classList.add('user-message', 'image-message');

        const imagen = document.createElement('img');
        imagen.src = evento.target.result;
        imagen.alt = 'Evidencia fotográfica del reporte';

        contenedor.appendChild(imagen);
        chatArea.appendChild(contenedor);

        chatArea.scrollTop = chatArea.scrollHeight;

        datosReporte.foto = true;
        fotoSeleccionada = archivo;

        generarTicket();
    };

    lector.readAsDataURL(archivo);
}

function generarTicket() {
    const numeroTicket =
        'LS-2026-' + Math.floor(1000 + Math.random() * 9000);

    const evidencia = datosReporte.foto
        ? '📸 Evidencia fotográfica: Adjunta'
        : '📸 Evidencia fotográfica: No adjunta';

    const respuesta =
        '🎫 REPORTE CREADO EXITOSAMENTE\n\n' +
        'Ticket: ' + numeroTicket + '\n' +
        'Categoría: ' + datosReporte.categoria + '\n' +
        'Sector: ' + datosReporte.sector + '\n' +
        'Ubicación: ' + datosReporte.ubicacion + '\n' +
        'Descripción: ' + datosReporte.descripcion + '\n' +
        evidencia + '\n' +
        'Estado: Recibido\n\n' +
        'Guarda tu número de ticket para consultar el estado de tu reporte.';

    agregarMensaje(respuesta, 'asistente');

    estadoReporte = null;
    fotoSeleccionada = null;

    datosReporte = {
        categoria: '',
        sector: '',
        ubicacion: '',
        descripcion: '',
        foto: false
    };
}
function mostrarCategoriasReporte() {
    const contenedor = document.createElement('div');
    contenedor.classList.add('selection-options');

    const categorias = [
        '🗑️ Basura acumulada',
        '💡 Luminaria dañada',
        '🛣️ Calle deteriorada',
        '🌳 Árbol caído',
        '🚧 Obstrucción de vía',
        '➕ Otro problema municipal'
    ];

    categorias.forEach(function(categoria) {
        const boton = document.createElement('button');
        boton.textContent = categoria;

        boton.addEventListener('click', function() {
            datosReporte.categoria = categoria;
            contenedor.remove();

            agregarMensaje(categoria, 'usuario');

            setTimeout(function() {
                agregarMensaje(
                    '📍 Ahora selecciona el sector de Laguna Salada donde está ocurriendo el problema.',
                    'asistente'
                );

                mostrarSectoresReporte();
            }, 400);
        });

        contenedor.appendChild(boton);
    });

    chatArea.appendChild(contenedor);
    chatArea.scrollTop = chatArea.scrollHeight;
}


function mostrarSectoresReporte() {
    const contenedor = document.createElement('div');
    contenedor.classList.add('selection-options');

    const sectores = [
    ...sectoresLagunaSalada,
    'Otro sector de Laguna Salada'
];

    sectores.forEach(function(sector) {
        const boton = document.createElement('button');
        boton.textContent = '📍 ' + sector;

        boton.addEventListener('click', function() {
            contenedor.remove();

            if (sector === 'Otro sector de Laguna Salada') {
                estadoReporte = 'esperandoOtroSector';

                agregarMensaje(
                    '📍 Otro sector de Laguna Salada',
                    'usuario'
                );

                setTimeout(function() {
                    agregarMensaje(
                        '✍️ Escribe el nombre del sector. Esta instancia solo gestiona reportes correspondientes a la jurisdicción directa de Laguna Salada.',
                        'asistente'
                    );
                }, 400);

            } else {
                datosReporte.sector = sector;
                estadoReporte = 'esperandoUbicacion';

                agregarMensaje('📍 ' + sector, 'usuario');

                setTimeout(function() {
                    agregarMensaje(
                        '📌 Perfecto. Ahora indícame la calle, número, intersección o un punto de referencia donde está ocurriendo el problema.',
                        'asistente'
                    );
                }, 400);
            }
        });

        contenedor.appendChild(boton);
    });

    chatArea.appendChild(contenedor);
    chatArea.scrollTop = chatArea.scrollHeight;
}
function mostrarMenuLagunaSalada() {
    const contenedor = document.createElement('div');
    contenedor.classList.add('selection-options');

    const opciones = [
        {
            texto: '📜 Historia',
            pregunta: 'Historia de Laguna Salada'
        },
        {
            texto: '📸 Lugares emblemáticos',
            pregunta: 'Lugares emblemáticos de Laguna Salada'
        },
        {
            texto: '👥 Población',
            pregunta: 'Población de Laguna Salada'
        },
        {
            texto: '💼 Economía',
            pregunta: 'Economía de Laguna Salada'
        },
        {
            texto: '🗺️ Sectores y barrios',
            pregunta: 'Sectores y barrios de Laguna Salada'
        },
        {
            texto: '🏛️ Instituciones municipales',
            pregunta: 'Instituciones municipales de Laguna Salada'
        }
    ];

    opciones.forEach(function(opcion) {
        const boton = document.createElement('button');
        boton.textContent = opcion.texto;

        boton.addEventListener('click', function() {
            contenedor.remove();
            preguntaRapida(opcion.pregunta);
        });

        contenedor.appendChild(boton);
    });

    chatArea.appendChild(contenedor);
    chatArea.scrollTop = chatArea.scrollHeight;
}
function volverMenuPrincipal() {

    estadoReporte = null;
    esperandoSector = false;

    const mensaje = document.createElement('div');
    mensaje.classList.add('message');

    mensaje.innerHTML =
        '🏠 <strong>MENÚ PRINCIPAL</strong><br><br>' +
        '¿En qué puedo ayudarte hoy?';

    chatArea.appendChild(mensaje);

    const contenedor = document.createElement('div');
    contenedor.classList.add('quick-actions');

    contenedor.innerHTML = `
        <button onclick="preguntaRapida('Quiero conocer Laguna Salada')">🏛️ Conoce Laguna Salada</button>
        <button onclick="preguntaRapida('Quiero consultar los servicios municipales')">🏢 Servicios municipales</button>
        <button onclick="preguntaRapida('Quiero reportar un problema')">🚨 Reportar un problema</button>
        <button onclick="preguntaRapida('Quiero consultar mi ticket')">🎫 Consultar mi ticket</button>
        <button onclick="preguntaRapida('Quiero ver noticias y eventos')">📰 Noticias y eventos</button>
        <button onclick="preguntaRapida('¿Cómo puedo contactar con el Ayuntamiento?')">📞 Contacto</button>
    `;

    chatArea.appendChild(contenedor);

    chatArea.scrollTop = chatArea.scrollHeight;
}
function mostrarLugarEmblematico(nombre, imagen, descripcion) {

    const tarjeta = document.createElement('div');
    tarjeta.classList.add('lugar-card');

    tarjeta.innerHTML = `
        <img src="${imagen}" alt="${nombre}">
        <div class="lugar-card-content">
            <h3>${nombre}</h3>
            <p>${descripcion}</p>
        </div>
    `;

    chatArea.appendChild(tarjeta);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function mostrarMenuLugares() {

    const contenedor = document.createElement('div');
    contenedor.classList.add('selection-options');

    const lugares = [
        '🌳 Parque Municipal Máximo Gómez',
        '🏛️ Palacio Municipal',
        '⛪ Parroquia San Antonio de Padua',
        '🪦 Cementerio Municipal'
    ];

    lugares.forEach(function(lugar) {

        const boton = document.createElement('button');
        boton.textContent = lugar;

        boton.addEventListener('click', function() {

            contenedor.remove();
            agregarMensaje(lugar, 'usuario');

            setTimeout(function() {

                if (lugar === '🌳 Parque Municipal Máximo Gómez') {

                    mostrarLugarEmblematico(
                        'Parque Municipal Mirador del Valle “Máximo Gómez”',
                        'images/parque-maximo-gomez.png',
                        'Uno de los principales espacios públicos de Laguna Salada, dedicado al encuentro, la recreación y la convivencia de la comunidad.'
                    );

                } else if (lugar === '🏛️ Palacio Municipal') {

                    mostrarLugarEmblematico(
                        'Palacio Municipal de Laguna Salada',
                        'images/palacio-municipal.png',
                        'Sede del gobierno local y centro de la administración municipal de Laguna Salada, provincia Valverde.'
                    );

                } else if (lugar === '⛪ Parroquia San Antonio de Padua') {

                    mostrarLugarEmblematico(
                        'Parroquia San Antonio de Padua',
                        'images/parroquia-san-antonio.png',
                        'Espacio religioso vinculado a la vida espiritual y comunitaria de Laguna Salada y a la tradición de San Antonio de Padua.'
                    );

                } else if (lugar === '🪦 Cementerio Municipal') {

                    mostrarLugarEmblematico(
                        'Cementerio Municipal de Laguna Salada',
                        'images/cementerio-municipal.jpeg',
                        'Espacio municipal destinado al descanso y memoria de los seres queridos de la comunidad de Laguna Salada.'
                    );
                }

            }, 300);
        });

        contenedor.appendChild(boton);
    });

    chatArea.appendChild(contenedor);
    chatArea.scrollTop = chatArea.scrollHeight;
}


    function enviarMensaje() {
    const texto = input.value.trim();

    if (texto === '') return;

    agregarMensaje(texto, 'usuario');
    input.value = '';

    setTimeout(function() {

        const pregunta = texto.toLowerCase();
        let respuesta = '';

        // PASO 1: Esperando categoría del reporte
        if (estadoReporte === 'esperandoOtroSector') {

    const sectorIngresado = texto.toLowerCase();

    const jurisdiccionesExternas = [
        'la caya',
        'jaibon',
        'jaibón',
        'cruce de guayacanes',
        'guayacanes'
    ];

    const fueraDeJurisdiccion = jurisdiccionesExternas.some(function(lugar) {
        return sectorIngresado.includes(lugar);
    });

    if (fueraDeJurisdiccion) {
        respuesta =
            '⚠️ La ubicación indicada no corresponde a la jurisdicción directa atendida por el Ayuntamiento Municipal de Laguna Salada.\n\n' +
            'Esta instancia del asistente gestiona exclusivamente reportes correspondientes a Laguna Salada y sus sectores.\n\n' +
            'El reporte no ha sido generado.';

        estadoReporte = null;

        datosReporte = {
            categoria: '',
            sector: '',
            ubicacion: '',
            descripcion: '',
            foto: false
        };

    } else {
        datosReporte.sector = texto;
        estadoReporte = 'esperandoUbicacion';

        respuesta =
            '📌 Gracias. Ahora indícame la calle, número, intersección o un punto de referencia donde está ocurriendo el problema.';
    }
        // PASO 2: Esperando ubicación
        } else if (estadoReporte === 'esperandoUbicacion') {

            datosReporte.ubicacion = texto;
            estadoReporte = 'esperandoDescripcion';

            respuesta =
                '📝 Perfecto. Describe brevemente qué está ocurriendo y cualquier detalle que pueda ayudar al Ayuntamiento a atender el caso.';

        // PASO 3: Esperando descripción
} else if (estadoReporte === 'esperandoDescripcion') {

    datosReporte.descripcion = texto;
    estadoReporte = 'esperandoFoto';

    respuesta =
        '📸 ¿Deseas adjuntar una foto como evidencia del problema?';

    setTimeout(function() {
        mostrarOpcionesFoto();
    }, 300);

        } else if (esperandoSector) {

            respuesta =
                '📍 Gracias. He registrado tu sector o comunidad como: ' +
                texto +
                '. Próximamente podré consultar la ruta y el horario correspondiente.';

            esperandoSector = false;

        } else if (
    pregunta.includes('conocer laguna salada') ||
    pregunta.includes('conoce laguna salada')
) {

    respuesta =
        '🏛️ CONOCE LAGUNA SALADA\n\n' +
        'Descubre la historia, los lugares emblemáticos, la población, la economía y los sectores de nuestro municipio.\n\n' +
        '¿Qué deseas conocer?';

    setTimeout(function() {
        mostrarMenuLagunaSalada();
    }, 300);

    // HISTORIA DE LAGUNA SALADA
} else if (
    pregunta.includes('historia de laguna salada')
) {

    respuesta =
         '📜 HISTORIA DE LAGUNA SALADA\n\n' +
        'Laguna Salada es uno de los tres municipios de la provincia Valverde, ubicado en la región Cibao Noroeste de la República Dominicana.\n\n' +
        '🏛️ Fue constituido como municipio mediante la Ley 916, promulgada el 12 de agosto de 1978.\n\n' +
        '📍 Limita al norte con la provincia Puerto Plata, al sur con Santa Cruz de Mao, al este con Esperanza y al oeste con la provincia Monte Cristi.\n\n' +
        'Su desarrollo ha estado estrechamente relacionado con la agricultura, el comercio y el crecimiento de sus comunidades.';


// LUGARES EMBLEMÁTICOS
} else if (
    pregunta.includes('lugares emblemáticos de laguna salada') ||
    pregunta.includes('lugares emblematicos de laguna salada')
) {

    respuesta =
       respuesta =
    '📸 LUGARES EMBLEMÁTICOS DE LAGUNA SALADA\n\n' +
    'Descubre algunos de los espacios representativos de nuestro municipio.\n\n' +
    'Selecciona el lugar que deseas conocer:';

setTimeout(function() {
    mostrarMenuLugares();
}, 300);

// POBLACIÓN
} else if (
    pregunta.includes('población de laguna salada') ||
    pregunta.includes('poblacion de laguna salada')
) {

    respuesta =
         '👥 POBLACIÓN DE LAGUNA SALADA\n\n' +
        'Según el X Censo Nacional de Población y Vivienda 2022 de la Oficina Nacional de Estadística (ONE), Laguna Salada cuenta con 10,627 habitantes.\n\n' +
        '👩 Mujeres: 5,275\n' +
        '👨 Hombres: 5,352\n\n' +
        '📊 Esta información corresponde específicamente a Laguna Salada y se presenta separada de los distritos municipales de Jaibón, La Caya y Cruce de Guayacanes.';

// ECONOMÍA
} else if (
    pregunta.includes('economía de laguna salada') ||
    pregunta.includes('economia de laguna salada')
) {

    respuesta =
        '💼 ECONOMÍA DE LAGUNA SALADA\n\n' +
        'La economía de Laguna Salada está fuertemente vinculada a la agricultura, el comercio y los servicios locales.\n\n' +
        '🍌 La producción de banano tiene especial importancia, incluyendo producción destinada a la exportación.\n\n' +
        '🌱 Agricultura y producción de frutos menores\n' +
        '🏪 Comercio local\n' +
        '🚚 Transporte y distribución\n' +
        '🛠️ Pequeños negocios y servicios\n\n' +
        'El desarrollo agrícola continúa siendo uno de los ejes estratégicos para el crecimiento económico del municipio.';

// SECTORES Y BARRIOS
