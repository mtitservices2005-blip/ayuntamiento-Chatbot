// =====================================================
// 🗄️ GUARDAR TICKET EN SUPABASE
// Envía los datos recopilados durante el reporte a la
// tabla "tickets" de nuestra base de datos real.
//
// Devuelve:
// true  = ticket guardado correctamente.
// false = ocurrió un error durante el guardado.
// =====================================================

// =====================================================
// 📸 SUBIR EVIDENCIA FOTOGRÁFICA A SUPABASE STORAGE
// Recibe el número del ticket y sube la fotografía
// seleccionada por el ciudadano al bucket:
//
// evidencias-tickets
//
// Devuelve:
// - La ruta del archivo si la subida fue exitosa.
// - null si no hay foto o si ocurre algún error.
// =====================================================

async function subirEvidenciaASupabase(numeroTicket) {

    // -------------------------------------------------
    // VERIFICAR SI EL CIUDADANO ADJUNTÓ UNA FOTO
    // -------------------------------------------------

    if (!fotoSeleccionada) {
        return null;
    }


    try {

        // -------------------------------------------------
        // OBTENER LA EXTENSIÓN ORIGINAL DEL ARCHIVO
        // Ejemplo: foto.jpg → jpg
        // -------------------------------------------------

        const partesNombre = fotoSeleccionada.name.split('.');

        const extension =
            partesNombre.length > 1
                ? partesNombre.pop().toLowerCase()
                : 'jpg';


        // -------------------------------------------------
        // CREAR UNA RUTA ÚNICA PARA LA EVIDENCIA
        //
        // Ejemplo:
        // LS-2026-9775/1720876543210.jpg
        // -------------------------------------------------

        const rutaArchivo =
            numeroTicket +
            '/' +
            Date.now() +
            '.' +
            extension;


        // -------------------------------------------------
        // SUBIR LA FOTO AL BUCKET DE SUPABASE
        // -------------------------------------------------

        const { error } = await supabaseClient
            .storage
            .from('evidencias-tickets')
            .upload(
                rutaArchivo,
                fotoSeleccionada,
                {
                    cacheControl: '3600',
                    upsert: false
                }
            );


        // -------------------------------------------------
        // COMPROBAR SI OCURRIÓ UN ERROR
        // -------------------------------------------------

        if (error) {

            console.error(
                '❌ Error al subir evidencia a Supabase:',
                error
            );

            return null;
        }


        // -------------------------------------------------
        // SUBIDA EXITOSA
        // Guardamos la ruta, no una URL pública.
        // Esto nos permitirá mantener las fotos privadas.
        // -------------------------------------------------

        console.log(
            '✅ Evidencia subida correctamente:',
            rutaArchivo
        );

        return rutaArchivo;


    } catch (error) {

        console.error(
            '❌ Error inesperado al subir evidencia:',
            error
        );

        return null;
    }
}

async function guardarTicketEnSupabase(numeroTicket) {

    try {
// =====================================================
// 📸 SUBIR EVIDENCIA ANTES DE GUARDAR EL TICKET
// Si el ciudadano no adjuntó una foto, el resultado
// será null y el ticket podrá guardarse normalmente.
// =====================================================

const rutaFoto =
    await subirEvidenciaASupabase(numeroTicket);

        // -------------------------------------------------
        // PREPARAR LOS DATOS DEL NUEVO TICKET
        // -------------------------------------------------

        const nuevoTicket = {

    numero: numeroTicket,

    categoria: datosReporte.categoria,

    sector: datosReporte.sector,

    ubicacion: datosReporte.ubicacion,

    latitud: datosReporte.latitud,

    longitud: datosReporte.longitud,

    descripcion: datosReporte.descripcion,

    foto_url: rutaFoto,

    // Todo nuevo reporte comienza como recibido.
    estado: 'recibido',

    // Este chatbot pertenece al Ayuntamiento de Laguna Salada.
    // El municipio se identifica mediante su ID en Supabase.
    municipio_id: 1
};


        // -------------------------------------------------
        // INSERTAR EL TICKET EN LA BASE DE DATOS
        // -------------------------------------------------

        const { error } = await supabaseClient
            .from('tickets')
            .insert([nuevoTicket]);


        // -------------------------------------------------
        // COMPROBAR SI SUPABASE DEVOLVIÓ UN ERROR
        // -------------------------------------------------

        if (error) {

            console.error(
                '❌ Error al guardar ticket en Supabase:',
                error
            );

            return false;
        }


        // -------------------------------------------------
        // GUARDADO EXITOSO
        // -------------------------------------------------

        console.log(
            '✅ Ticket guardado correctamente en Supabase:',
            numeroTicket
        );

        return true;

    } catch (error) {

        // Captura cualquier error inesperado.
        console.error(
            '❌ Error inesperado al guardar el ticket:',
            error
        );

        return false;
    }
}

// =====================================================
// 🎫 CONSULTAR TICKET EN SUPABASE
// Busca un ticket por su número dentro del municipio
// de Laguna Salada y devuelve su estado al ciudadano.
// =====================================================

async function consultarTicketEnSupabase(numeroTicket) {

    try {

        const numeroLimpio = numeroTicket
            .trim()
            .toUpperCase();

        const { data, error } = await supabaseClient
            .from('tickets')
            .select(
                'numero, categoria, sector, estado, creado_en'
            )
            .eq('numero', numeroLimpio)
            .eq('municipio_id', 1)
            .maybeSingle();

        if (error) {

            console.error(
                '❌ Error al consultar ticket:',
                error
            );

            return {
                exito: false,
                mensaje:
                    '⚠️ No fue posible consultar el ticket en este momento. Inténtalo nuevamente.'
            };
        }

        if (!data) {

            return {
                exito: false,
                mensaje:
                    '🔎 No encontramos ningún reporte con el número ' +
                    numeroLimpio +
                    '.\n\nVerifica que esté escrito correctamente e inténtalo de nuevo.'
            };
        }

        const nombresEstados = {
            'recibido': '🟡 Reporte recibido',
            'asignado': '🔵 Asignado para atención',
            'en-proceso': '🟠 Trabajo en proceso',
            'pendiente-verificacion':
                '🟣 Trabajo realizado, pendiente de verificación',
            'resuelto': '🟢 Reporte resuelto'
        };

        const estadoVisible =
            nombresEstados[data.estado] || data.estado;

        const fechaCreacion = data.creado_en
            ? new Date(data.creado_en).toLocaleDateString(
                'es-DO',
                {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                }
            )
            : 'No disponible';

        return {
            exito: true,
            mensaje:
                '🎫 ESTADO DE TU REPORTE\n\n' +
                'Ticket: ' + data.numero + '\n' +
                'Categoría: ' + data.categoria + '\n' +
                'Sector: ' + data.sector + '\n' +
                'Estado: ' + estadoVisible + '\n' +
                'Fecha del reporte: ' + fechaCreacion
        };

    } catch (error) {

        console.error(
            '❌ Error inesperado al consultar ticket:',
            error
        );

        return {
            exito: false,
            mensaje:
                '⚠️ Ocurrió un problema inesperado al consultar el ticket.'
        };
    }
}

async function generarTicket() {
const ahora = new Date();

const año = String(ahora.getFullYear()).slice(-2);

const mes = String(

function mostrarOpcionesUbicacion() {

    const botonEscribir = document.createElement('button');
    botonEscribir.textContent = '✍🏼 Escribir dirección o referencia';


    // -------------------------------------------------
    // OPCIÓN 1: COMPARTIR UBICACIÓN GPS
    // -------------------------------------------------
    botonGPS.addEventListener('click', function() {

        contenedor.remove();

        // Inicia la solicitud de ubicación GPS.
        obtenerUbicacionGPS();
    });

    // OPCIÓN 2: ESCRIBIR UBICACIÓN MANUALMENTE
    // -------------------------------------------------
    botonEscribir.addEventListener('click', function() {

        // Elimina las opciones una vez seleccionada una.
        contenedor.remove();

        // Muestra la elección del ciudadano en el chat.

        );

        // Solicita la ubicación escrita.
        setTimeout(function() {

            agregarMensaje(
                '📌 Escribe la calle, número, intersección o un punto de referencia donde está ocurriendo el problema.',

    chatArea.scrollTop = chatArea.scrollHeight;

// =====================================================
// 📡 OBTENER UBICACIÓN GPS
// Solicita permiso al ciudadano para acceder a la
// geolocalización del dispositivo.
//
// Si tiene éxito:
// - Guarda latitud y longitud.
// - Solicita una referencia escrita opcional.
//
// Si falla:
// - Explica el problema.
// - Permite continuar escribiendo la ubicación.
// =====================================================
function obtenerUbicacionGPS() {

    // Muestra en el chat la opción seleccionada.
    agregarMensaje(
        '📍 Compartir ubicación actual',
        'usuario'
    );


    // -------------------------------------------------
    // VERIFICAR COMPATIBILIDAD DEL NAVEGADOR
    // -------------------------------------------------
    if (!navigator.geolocation) {

        agregarMensaje(
            '⚠️ Tu dispositivo o navegador no permite obtener la ubicación.\n\n' +
            'Puedes continuar escribiendo una dirección o punto de referencia.',
            'asistente'
        );

        estadoReporte = 'esperandoUbicacion';

        return;
    }


    // Informa al ciudadano que se está solicitando el GPS.
    agregarMensaje(
        '📡 Obteniendo tu ubicación. Autoriza el acceso si tu navegador lo solicita...',
        'asistente'
    );


    // -------------------------------------------------
    // SOLICITAR UBICACIÓN AL DISPOSITIVO
    // -------------------------------------------------
    navigator.geolocation.getCurrentPosition(

        // =============================================
        // UBICACIÓN OBTENIDA CORRECTAMENTE
        // =============================================
        function(position) {

            // Guarda las coordenadas obtenidas.
            datosReporte.latitud = position.coords.latitude;
            datosReporte.longitud = position.coords.longitude;

            // Cambia al estado que espera una referencia opcional.
            estadoReporte = 'esperandoReferenciaOpcional';

            agregarMensaje(
                '✅ Ubicación GPS registrada correctamente.\n\n' +
                '📌 Ahora puedes escribir una calle o punto de referencia para ayudar al personal del Ayuntamiento a encontrar el lugar con mayor facilidad.\n\n' +
                'Si no deseas agregar una referencia, escribe: continuar',
                'asistente'
            );
        },


        // =============================================
        // ERROR AL OBTENER LA UBICACIÓN
        // =============================================
        function(error) {

            let mensajeError =
                '⚠️ No fue posible obtener tu ubicación. ';

            // El usuario rechazó el permiso.
            if (error.code === 1) {

                mensajeError +=
                    'El permiso de ubicación fue rechazado.';

            // El dispositivo no pudo determinar la posición.
            } else if (error.code === 2) {

                mensajeError +=
                    'Tu ubicación no está disponible en este momento.';

            // La solicitud superó el tiempo máximo.
            } else if (error.code === 3) {

                mensajeError +=
                    'La solicitud de ubicación tardó demasiado.';
            }

            mensajeError +=
                '\n\n📌 Puedes continuar escribiendo manualmente la dirección o un punto de referencia.';

            agregarMensaje(
                mensajeError,
                'asistente'
            );

            // Permite continuar mediante ubicación escrita.
            estadoReporte = 'esperandoUbicacion';
        },


        // =============================================
        // CONFIGURACIÓN DE GEOLOCALIZACIÓN
        // =============================================
        {
            // Solicita la mayor precisión disponible.
            enableHighAccuracy: true,

            // Tiempo máximo de espera: 10 segundos.
            timeout: 10000,

            // No utiliza una ubicación antigua almacenada.
            maximumAge: 0
        }
    );
}
