<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Panel de Brigada | Laguna Salada</title>

    <style>

        /* =====================================================
           🎨 CONFIGURACIÓN GENERAL
           ===================================================== */

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f7f6;
            color: #263238;
        }


        /* =====================================================
           👷 ENCABEZADO
           ===================================================== */

        .header {
            background: #075e54;
            color: white;
            padding: 18px 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 21px;
        }

        .header p {
            margin: 6px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }


        /* =====================================================
           📦 CONTENEDOR PRINCIPAL
           ===================================================== */

        .container {
            max-width: 850px;
            margin: auto;
            padding: 18px;
        }


        /* =====================================================
           👷 INFORMACIÓN DE LA BRIGADA
           ===================================================== */

        .brigada-info {
            background: white;
            padding: 18px;
            border-radius: 14px;
            margin-bottom: 18px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.07);
        }

        .brigada-info h2 {
            margin: 0 0 6px;
            color: #075e54;
            font-size: 20px;
        }

        .brigada-info p {
            margin: 0;
            color: #607d8b;
            font-size: 14px;
        }

        .motivo-devolucion {
    background: #ffebee;
    color: #b71c1c;
    border-left: 5px solid #c62828;
    padding: 14px;
    border-radius: 9px;
    margin-top: 12px;
    font-size: 14px;
    line-height: 1.5;
}

.motivo-devolucion span {
    color: #7f1d1d;
    font-weight: 600;
}

        /* =====================================================
           🎫 TARJETAS DE TRABAJO
           ===================================================== */

        .trabajos-grid {
            display: grid;
            gap: 15px;
        }

        .trabajo-card {
            background: white;
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.07);
        }

        .ticket-number {
            color: #075e54;
            font-size: 17px;
            font-weight: bold;
        }

        .categoria {
            margin-top: 5px;
            font-weight: 600;
        }

        .estado {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 10px;
            border-radius: 20px;
            background: #dbeafe;
            color: #1e40af;
            font-size: 12px;
            font-weight: bold;
        }

        .info {
            margin-top: 14px;
            display: grid;
            gap: 8px;
            font-size: 14px;
            line-height: 1.5;
        }

        .descripcion {
            background: #f7f9f9;
            padding: 12px;
            border-radius: 9px;
            margin-top: 12px;
            font-size: 14px;
            line-height: 1.5;
        }


        /* =====================================================
           🔘 BOTONES
           ===================================================== */

        .acciones {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 10px 13px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .mapa-btn {
            background: #e8f5e9;
            color: #1b5e20;
        }

        .foto-btn {
            background: #e3f2fd;
            color: #0d47a1;
        }
        .iniciar-btn {
    background: #fff3e0;
    color: #e65100;
        }   

        .completar-btn {
    background: #e8f5e9;
    color: #1b5e20;
}

.finalizacion-box {
    width: 100%;
    margin-top: 12px;
    padding: 14px;
    background: #f7f9f9;
    border-radius: 10px;
    display: grid;
    gap: 10px;
}

.finalizacion-box input,
.finalizacion-box textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
}

.finalizacion-box textarea {
    resize: vertical;
}

.motivo-devolucion {
    background: #ffebee;
    color: #b71c1c;
    border-left: 5px solid #c62828;
    padding: 14px;
    border-radius: 9px;
    margin-top: 12px;
    font-size: 14px;
    line-height: 1.5;
}

.motivo-devolucion span {
    color: #7f1d1d;
    font-weight: 600;
}

        /* =====================================================
           📭 SIN TRABAJOS
           ===================================================== */

        .sin-trabajos {
            background: white;
            padding: 30px;
            border-radius: 14px;
            text-align: center;
            color: #607d8b;
            box-shadow: 0 3px 12px rgba(0,0,0,0.07);
        }


        /* =====================================================
           📱 RESPONSIVE
           ===================================================== */

        @media (max-width: 600px) {

            .container {
                padding: 12px;
            }

            .header h1 {
                font-size: 19px;
            }

            .trabajo-card {
                padding: 15px;
            }

            .acciones {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        .header-content {
    display: flex;
    align-items: center;
    gap: 12px;
}

.header-logo {
    width: 52px;
    height: 52px;
    object-fit: contain;
    flex-shrink: 0;
}

.header-text {
    min-width: 0;
}

.header-text h1 {
    margin: 0 0 5px;
}

.header-text p {
    margin: 0;
}

    </style>

</head>


<body>


    <!-- =====================================================
         👷 ENCABEZADO
         ===================================================== -->

    <header class="header">

    <div class="header-content">

        <img
            src="images/logo.png"
            alt="Logo Ayuntamiento de Laguna Salada"
            class="header-logo"
        >

        <div class="header-text">
            <h1>Panel de Brigada</h1>
            <p>Ayuntamiento Municipal de Laguna Salada</p>
        </div>

    </div>

</header>


    <!-- =====================================================
         📦 CONTENIDO PRINCIPAL
         ===================================================== -->

    <main class="container">


        <!-- =================================================
             👷 INFORMACIÓN DE LA BRIGADA
             ================================================= -->

        <section class="brigada-info">

            <h2 id="nombreBrigada">
                Cargando brigada...
            </h2>

            <p id="descripcionBrigada">
                Cargando información...
            </p>

        </section>


        <!-- =================================================
             🎫 TRABAJOS ASIGNADOS
             ================================================= -->

        <section
            id="trabajosContainer"
            class="trabajos-grid"
        >
        </section>


    </main>


    <!-- =====================================================
         🗄️ LIBRERÍA DE SUPABASE
         ===================================================== -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


    <script>


        // =====================================================
        // 🗄️ CONFIGURACIÓN DE SUPABASE
        // Usa la misma URL y Publishable Key del chatbot
        // y del panel administrativo.
        // =====================================================

        const SUPABASE_URL =
            'https://gjtunejwnpsutyrrbfdc.supabase.co';

        const SUPABASE_KEY =
            'sb_publishable_QW5-4Irj3BoivYe1fIIH9Q_ll14ktiE';

        const supabaseClient = supabase.createClient(
            SUPABASE_URL,
            SUPABASE_KEY
        );


        // =====================================================
        // 👷 BRIGADA DE PRUEBA
        //
        // Temporalmente usamos el ID 2 para Obras Públicas.
        // Más adelante la autenticación determinará
        // automáticamente qué brigada inició sesión.
        // =====================================================

        const BRIGADA_ID_PRUEBA = 2;


        // =====================================================
        // 👷 CARGAR INFORMACIÓN DE LA BRIGADA
        // =====================================================

        async function cargarBrigada() {

            const { data, error } = await supabaseClient
    .from('brigadas')
    .select('*')
    .eq('id', BRIGADA_ID_PRUEBA)
    .eq('municipio_id', 1)
    .single();


            if (error) {

                console.error(
                    '❌ Error al cargar brigada:',
                    error
                );

                document.getElementById(
                    'nombreBrigada'
                ).textContent =
                    'No fue posible cargar la brigada';

                return;
            }


            document.getElementById(
                'nombreBrigada'
            ).textContent =
                '👷 ' + data.nombre;


            document.getElementById(
                'descripcionBrigada'
            ).textContent =
                data.descripcion || '';
        }


        // =====================================================
        // 🎫 CARGAR TRABAJOS ASIGNADOS
        // Solo carga tickets pertenecientes a esta brigada.
        // =====================================================

        async function cargarTrabajos() {

            const { data, error } = await supabaseClient
    .from('tickets')
    .select('*')
    .eq('municipio_id', 1)
    .eq(
        'brigada_id',
        BRIGADA_ID_PRUEBA
    )
    .order(
        'creado_en',
        {
            ascending: false
        }
    );


            if (error) {

                console.error(
                    '❌ Error al cargar trabajos:',
                    error
                );

                return;
            }


            mostrarTrabajos(data || []);
        }


        // =====================================================
        // 🎨 MOSTRAR TRABAJOS
        // =====================================================

        function mostrarTrabajos(trabajos) {

            const contenedor =
                document.getElementById(
                    'trabajosContainer'
                );


            contenedor.innerHTML = '';


            if (trabajos.length === 0) {

                contenedor.innerHTML = `

                    <div class="sin-trabajos">

                        📭 No hay trabajos asignados
                        actualmente a esta brigada.

                    </div>
                `;

                return;
            }


            trabajos.forEach(function(ticket) {
                const nombresEstados = {
    'asignado': '🔵 Asignado',
    'en-proceso': '🟠 En proceso',
    'pendiente-verificacion': '🟣 Pendiente de verificación',
    'resuelto': '🟢 Resuelto'
};

const estadoVisible =
    nombresEstados[ticket.estado] || ticket.estado;

                const tarjeta =
                    document.createElement('article');


                tarjeta.classList.add(
                    'trabajo-card'
                );


                tarjeta.innerHTML = `

                    <div class="ticket-number">
                        ${ticket.numero}
                    </div>

                    <div class="categoria">
                        ${ticket.categoria}
                    </div>

                    <span class="estado">
                        ${estadoVisible}
                    </span>


                    <div class="info">

                        <div>
                            <strong>📍 Sector:</strong>
                            ${ticket.sector}
                        </div>

                        <div>
                            <strong>📌 Ubicación:</strong>
                            ${ticket.ubicacion}
                        </div>

                    </div>


                    <div class="descripcion">

    <strong>📝 Descripción:</strong>
    <br>

    ${ticket.descripcion}

</div>


${
    ticket.motivo_devolucion
    ?
    `
        <div class="motivo-devolucion">

            <strong>
                ↩️ Trabajo devuelto para corrección
            </strong>

            <br><br>

            <strong>Motivo del administrador:</strong>
            <br>

            ${ticket.motivo_devolucion}

            <br><br>

            <span>
                Corrige el trabajo indicado y envía una nueva
                evidencia para verificación.
            </span>

        </div>
    `
    :
    ''
}


<div class="acciones">

                        ${
    ticket.latitud !== null &&
    ticket.longitud !== null
    ?
    `
        <button
            class="btn mapa-btn"
            onclick="
                verMapa(
                    ${ticket.latitud},
                    ${ticket.longitud}
                )
            "
        >
            🗺️ Ver ubicación GPS
        </button>
    `
    :
    ''
}



                        ${
                            ticket.foto_url
                            ?
                            `
                                <button
                                    class="btn foto-btn"
                                    onclick="
                                        verFoto(
                                            '${ticket.foto_url}'
                                        )
                                    "
                                >
                                    📸 Ver evidencia
                                </button>
                            `
                            :
                            ''
                        }

                        ${
    ticket.estado === 'asignado'
    ?
    `
        <button
            class="btn iniciar-btn"
            onclick="iniciarTrabajo(
                ${ticket.id},
                '${ticket.numero}'
            )"
        >
            🔧 Iniciar trabajo
        </button>
    `
    :
    ''
            }
    
            ${
    ticket.estado === 'en-proceso'
    ?
    `
        <div class="finalizacion-box">

            <label>
                <strong>📸 Foto del trabajo terminado:</strong>
            </label>

            <input
                type="file"
                id="foto-resolucion-${ticket.id}"
                accept="image/*"
                capture="environment"
            >

            <label>
                <strong>📝 Comentario de resolución:</strong>
            </label>

            <textarea
                id="comentario-resolucion-${ticket.id}"
                placeholder="Ejemplo: Se reparó el hoyo y se retiraron los escombros."
                rows="3"
            ></textarea>

            <button
                class="btn completar-btn"
                onclick="completarTrabajo(
                    ${ticket.id},
                    '${ticket.numero}'
                )"
            >
                ✅ Enviar para verificación
            </button>

        </div>
    `
    :
    ''
}
                    </div>
                `;


                contenedor.appendChild(tarjeta);
            });
        }


        // =====================================================
        // 🗺️ VER UBICACIÓN
        // =====================================================

        function verMapa(latitud, longitud) {

            const url =
                'https://www.google.com/maps?q=' +
                latitud +
                ',' +
                longitud;

            window.open(
                url,
                '_blank'
            );
        }


        // =====================================================
        // 📸 VER EVIDENCIA DEL CIUDADANO
        // =====================================================

        async function verFoto(rutaFoto) {

            try {

                const rutaLimpia =
                    rutaFoto.trim();


                const { data, error } =
                    await supabaseClient
                        .storage
                        .from(
                            'evidencias-tickets'
                        )
                        .download(
                            rutaLimpia
                        );


                if (error) {

                    console.error(
                        '❌ Error al abrir evidencia:',
                        error
                    );

                    alert(
                        'No fue posible abrir la evidencia.'
                    );

                    return;
                }


                const urlTemporal =
                    URL.createObjectURL(data);


                window.open(
                    urlTemporal,
                    '_blank'
                );


            } catch (error) {

                console.error(
                    '❌ Error inesperado:',
                    error
                );

                alert(
                    'Ocurrió un error al abrir la evidencia.'
                );
            }
        }


        // =====================================================
// 🔧 INICIAR TRABAJO
// Cambia el estado del ticket de "asignado" a
// "en-proceso" y guarda el cambio en Supabase.
// =====================================================

async function iniciarTrabajo(ticketId, numeroTicket) {

    const confirmar = confirm(
        '¿Deseas iniciar el trabajo del ticket ' +
        numeroTicket +
        '?'
    );

    if (!confirmar) {
        return;
    }


    try {

        const { error } = await supabaseClient
            .from('tickets')
            .update({
                estado: 'en-proceso'
            })
            .eq('id', ticketId)
            .eq('municipio_id', 1)
            .eq('brigada_id', BRIGADA_ID_PRUEBA)
            .eq('estado', 'asignado');


        if (error) {

            console.error(
                '❌ Error al iniciar trabajo:',
                error
            );

            alert(
                'No fue posible iniciar el trabajo.'
            );

            return;
        }


        alert(
            'El trabajo del ticket ' +
            numeroTicket +
            ' ha sido iniciado correctamente.'
        );


        await cargarTrabajos();


    } catch (error) {

        console.error(
            '❌ Error inesperado al iniciar trabajo:',
            error
        );

        alert(
            'Ocurrió un error inesperado al iniciar el trabajo.'
        );
    }
}

    // =====================================================
// 📸 COMPLETAR TRABAJO Y ENVIAR PARA VERIFICACIÓN
// Sube la fotografía de resolución a Supabase Storage,
// guarda el comentario y cambia el estado del ticket a
// "pendiente-verificacion".
// =====================================================

async function completarTrabajo(ticketId, numeroTicket) {

    const inputFoto = document.getElementById(
        'foto-resolucion-' + ticketId
    );

    const inputComentario = document.getElementById(
        'comentario-resolucion-' + ticketId
    );


    // -------------------------------------------------
    // VERIFICAR QUE SE HAYA SELECCIONADO UNA FOTO
    // -------------------------------------------------

    if (!inputFoto || !inputFoto.files.length) {

        alert(
            'Debes seleccionar una foto del trabajo terminado.'
        );

        return;
    }


    const archivo = inputFoto.files[0];

    const comentario = inputComentario
        ? inputComentario.value.trim()
        : '';


    // -------------------------------------------------
    // CREAR UN NOMBRE ÚNICO PARA LA FOTOGRAFÍA
    // -------------------------------------------------

    const extension = archivo.name
        .split('.')
        .pop();

    const nombreArchivo =
        numeroTicket +
        '-' +
        Date.now() +
        '.' +
        extension;

    const rutaArchivo =
        'resoluciones/' +
        nombreArchivo;


    try {

        // -------------------------------------------------
        // SUBIR FOTO AL BUCKET DE RESOLUCIONES
        // -------------------------------------------------

        const { error: errorSubida } = await supabaseClient
            .storage
            .from('evidencias-resoluciones')
            .upload(
                rutaArchivo,
                archivo
            );


        if (errorSubida) {

            console.error(
                '❌ Error al subir evidencia de resolución:',
                errorSubida
            );

            alert(
                'No fue posible subir la foto del trabajo terminado.'
            );

            return;
        }


        // -------------------------------------------------
        // ACTUALIZAR EL TICKET EN SUPABASE
        // -------------------------------------------------

        const { error: errorActualizacion } = await supabaseClient
            .from('tickets')
            .update({
            foto_resolucion_url: rutaArchivo,
            comentario_resolucion: comentario,
            completado_en: new Date().toISOString(),
            motivo_devolucion: null,
                estado: 'pendiente-verificacion'
})
            .eq('id', ticketId)
            .eq('municipio_id', 1)
            .eq('brigada_id', BRIGADA_ID_PRUEBA)
            .eq('estado', 'en-proceso');


        if (errorActualizacion) {

            console.error(
                '❌ Error al actualizar ticket:',
                errorActualizacion
            );

            alert(
                'La foto fue subida, pero no fue posible actualizar el ticket.'
            );

            return;
        }


        // -------------------------------------------------
        // CONFIRMACIÓN
        // -------------------------------------------------

        alert(
            'Trabajo enviado correctamente para verificación.'
        );


        await cargarTrabajos();


    } catch (error) {

        console.error(
            '❌ Error inesperado al completar trabajo:',
            error
        );

        alert(
            'Ocurrió un error inesperado al enviar el trabajo.'
        );
    }
}

        // =====================================================
        // 🚀 INICIALIZAR PANEL DE BRIGADA
        // =====================================================

        async function inicializarPanelBrigada() {

            await cargarBrigada();

            await cargarTrabajos();
        }


        inicializarPanelBrigada();


    </script>


</body>

</html>
