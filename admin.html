<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Panel Administrativo | Laguna Salada</title>

    <style>

        /* =====================================================
           🎨 CONFIGURACIÓN GENERAL
           ===================================================== */

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f7f6;
            color: #263238;
        }
 

        /* =====================================================
           🏛️ ENCABEZADO
           ===================================================== */

        .header {
            background: #075e54;
            color: white;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
        }

        .header p {
            margin: 5px 0 0;
            opacity: 0.9;
            font-size: 14px;
        }

        .admin-badge {
            background: rgba(255,255,255,0.15);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
        }


        /* =====================================================
           📦 CONTENEDOR PRINCIPAL
           ===================================================== */

        .container {
            max-width: 1250px;
            margin: auto;
            padding: 24px;
        }


        /* =====================================================
           📊 TARJETAS DE ESTADÍSTICAS
           ===================================================== */

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.07);
        }

        .stat-card .number {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .stat-card .label {
            color: #607d8b;
            font-size: 14px;
        }


        /* =====================================================
           🔍 BÚSQUEDA Y FILTROS
           ===================================================== */

        .toolbar {
            background: white;
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 20px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.07);

            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 220px;
            padding: 11px 14px;
            border: 1px solid #ddd;
            border-radius: 9px;
            font-size: 14px;
        }

        .filter-btn {
            border: none;
            padding: 10px 14px;
            border-radius: 9px;
            cursor: pointer;
            background: #edf2f1;
            color: #37474f;
            font-weight: 600;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #075e54;
            color: white;
        }


        /* =====================================================
           🎫 LISTA DE TICKETS
           ===================================================== */

        .tickets-grid {
            display: grid;
            gap: 16px;
        }

        .ticket-card {
            background: white;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.07);
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 14px;
        }

        .ticket-number {
            color: #075e54;
            font-weight: bold;
            font-size: 17px;
        }

        .ticket-category {
            margin-top: 5px;
            font-weight: 600;
        }


        /* =====================================================
           🚦 ESTADOS DEL TICKET
           ===================================================== */

        .status {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }

        .recibido {
            background: #fff3cd;
            color: #856404;
        }

        .asignado {
            background: #dbeafe;
            color: #1e40af;
        }

        .en-proceso {
            background: #ffe0b2;
            color: #e65100;
        }

        .pendiente-verificacion {
    background: #ede9fe;
    color: #6d28d9;
        }

        .resuelto {
            background: #d4edda;
            color: #155724;
        }


        /* =====================================================
           📝 INFORMACIÓN DEL TICKET
           ===================================================== */

        .ticket-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px 20px;
            margin: 15px 0;
            font-size: 14px;
            line-height: 1.5;
        }

        .ticket-description {
            background: #f7f9f9;
            padding: 12px;
            border-radius: 9px;
            margin: 12px 0;
            font-size: 14px;
            line-height: 1.5;
        }


        /* =====================================================
           🔘 ACCIONES DEL TICKET
           ===================================================== */

        .ticket-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .action-btn {
            border: none;
            border-radius: 8px;
            padding: 9px 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .map-btn {
            background: #e8f5e9;
            color: #1b5e20;
        }

        .photo-btn {
            background: #e3f2fd;
            color: #0d47a1;
        }

        .status-select {
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
        }


        /* =====================================================
           📱 DISEÑO RESPONSIVE
           ===================================================== */

        @media (max-width: 800px) {

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .ticket-info {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 500px) {

            .container {
                padding: 14px;
            }

            .stats {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .stat-card {
                padding: 15px;
            }

            .stat-card .number {
                font-size: 24px;
            }

            .header h1 {
                font-size: 18px;
            }
        }
        .aprobar-btn {
    background: #d4edda;
    color: #155724;
}

.devolver-btn {
    background: #ffebee;
    color: #b71c1c;
}

    </style>
</head>

<body>

    <!-- =====================================================
         🏛️ ENCABEZADO DEL PANEL
         ===================================================== -->

    <header class="header">

        <div>
            <h1>🏛️ Panel Administrativo</h1>
            <p>Ayuntamiento Municipal de Laguna Salada</p>
        </div>

        <div class="admin-badge">
            👤 Administrador
        </div>

    </header>


    <!-- =====================================================
         📦 CONTENIDO PRINCIPAL
         ===================================================== -->

    <main class="container">


        <!-- =================================================
             📊 RESUMEN DE TICKETS
             ================================================= -->

        <section class="stats">

            <div class="stat-card">
                <div class="number" id="totalTickets">4</div>
                <div class="label">🎫 Total tickets</div>
            </div>

            <div class="stat-card">
                <div class="number" id="ticketsRecibidos">1</div>
                <div class="label">🟡 Recibidos</div>
            </div>

            <div class="stat-card">
                <div class="number" id="ticketsProceso">2</div>
                <div class="label">🟠 En proceso</div>
            </div>

            <div class="stat-card">
                <div class="number" id="ticketsResueltos">1</div>
                <div class="label">🟢 Resueltos</div>
            </div>

        </section>


        <!-- =================================================
             🔍 BÚSQUEDA Y FILTROS
             ================================================= -->

        <section class="toolbar">

            <input
                type="text"
                id="searchInput"
                class="search-input"
                placeholder="🔍 Buscar ticket, sector o categoría..."
                oninput="buscarTickets()"
            >

            <button
                class="filter-btn active"
                onclick="filtrarTickets('todos', this)"
            >
                Todos
            </button>

            <button
                class="filter-btn"
                onclick="filtrarTickets('recibido', this)"
            >
                🟡 Recibidos
            </button>

            <button
                class="filter-btn"
                onclick="filtrarTickets('asignado', this)"
            >
                🔵 Asignados
            </button>

            <button
                class="filter-btn"
                onclick="filtrarTickets('en-proceso', this)"
            >
                🟠 En proceso
            </button>

            <button
                class="filter-btn"
                onclick="filtrarTickets('resuelto', this)"
            >
                🟢 Resueltos
            </button>

        </section>


        <!-- =================================================
             🎫 CONTENEDOR DE TICKETS
             ================================================= -->

        <section
            id="ticketsContainer"
            class="tickets-grid"
        >
        </section>

    </main>

<!-- =====================================================
     🗄️ LIBRERÍA DE SUPABASE
     Permite al panel conectarse con la base de datos real.
     ===================================================== -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script> 

// =====================================================
// 🗄️ CONFIGURACIÓN DE SUPABASE
// Conecta el panel administrativo con la base de datos.
// =====================================================

const SUPABASE_URL =
    'https://gjtunejwnpsutyrrbfdc.supabase.co';

const SUPABASE_KEY =
    'sb_publishable_QW5-4Irj3BoivYe1fIIH9Q_ll14ktiE';

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);
</script>

    <script>

        // =====================================================
        // 🎫 DATOS SIMULADOS DE TICKETS
        // Más adelante estos datos vendrán de una base de datos
        // real y se actualizarán automáticamente.
        // =====================================================

        let tickets = [];
// =====================================================
// 👷 LISTA DE BRIGADAS
// Se cargará automáticamente desde Supabase.
// =====================================================

let brigadas = [];

// =====================================================
// 🗄️ CARGAR TICKETS DESDE SUPABASE
// Consulta la tabla "tickets" y carga los reportes reales,
// ordenando primero los más recientes.
// =====================================================
// =====================================================
// 👷 CARGAR BRIGADAS DESDE SUPABASE
// Consulta las brigadas activas disponibles para asignar
// los tickets del Ayuntamiento.
// =====================================================

async function cargarBrigadasDesdeSupabase() {

    try {

        const { data, error } = await supabaseClient
    .from('brigadas')
    .select('*')
    .eq('municipio_id', 1)
    .eq('activa', true)
    .order('nombre', {
        ascending: true
    });


        // -------------------------------------------------
        // VERIFICAR SI SUPABASE DEVOLVIÓ UN ERROR
        // -------------------------------------------------

        if (error) {

            console.error(
                '❌ Error al cargar brigadas:',
                error
            );

            return;
        }


        // -------------------------------------------------
        // GUARDAR LAS BRIGADAS RECIBIDAS
        // -------------------------------------------------

        brigadas = data || [];


        console.log(
            '✅ Brigadas cargadas desde Supabase:',
            brigadas
        );


    } catch (error) {

        console.error(
            '❌ Error inesperado al cargar brigadas:',
            error
        );
    }
}

async function cargarTicketsDesdeSupabase() {

    try {

        const { data, error } = await supabaseClient
    .from('tickets')
    .select('*')
    .eq('municipio_id', 1)
    .order('creado_en', {
        ascending: false
    });


        // -------------------------------------------------
        // VERIFICAR SI SUPABASE DEVOLVIÓ UN ERROR
        // -------------------------------------------------

        if (error) {

            console.error(
                '❌ Error al cargar tickets:',
                error
            );

            return;
        }


        // -------------------------------------------------
        // GUARDAR LOS TICKETS RECIBIDOS
        // -------------------------------------------------

        tickets = data || [];


        // -------------------------------------------------
        // ACTUALIZAR EL PANEL
        // -------------------------------------------------

        mostrarTickets();
        actualizarEstadisticas();


        console.log(
            '✅ Tickets cargados desde Supabase:',
            tickets.length
        );


    } catch (error) {

        console.error(
            '❌ Error inesperado al cargar tickets:',
            error
        );
    }
}

        // =====================================================
        // 🎨 OBTENER NOMBRE VISIBLE DEL ESTADO
        // Convierte el valor interno del estado en un texto
        // amigable para mostrar al administrador.
        // =====================================================

        function obtenerNombreEstado(estado) {

    const nombres = {
        'recibido': '🟡 Recibido',
        'asignado': '🔵 Asignado',
        'en-proceso': '🟠 En proceso',
        'pendiente-verificacion': '🟣 Pendiente de verificación',
        'resuelto': '🟢 Resuelto'
    };

    return nombres[estado] || estado;
}

// =====================================================
// 🗓️ FORMATEAR FECHA
// Convierte la fecha técnica de Supabase en una fecha
// legible para el personal del Ayuntamiento.
// =====================================================

function formatearFecha(fechaISO) {

    if (!fechaISO) {
        return 'Fecha no disponible';
    }

    return new Date(fechaISO).toLocaleString(
        'es-DO',
        {
            dateStyle: 'short',
            timeStyle: 'short'
        }
    );
}


        // =====================================================
        // 🎫 MOSTRAR TICKETS
        // Construye visualmente las tarjetas usando los datos
        // almacenados en el arreglo tickets.
        // =====================================================

        function mostrarTickets(lista = tickets) {

            const contenedor =
                document.getElementById('ticketsContainer');

            contenedor.innerHTML = '';

            lista.forEach(function(ticket) {

                const tarjeta = document.createElement('article');

                tarjeta.classList.add('ticket-card');

                tarjeta.dataset.estado = ticket.estado;

                tarjeta.dataset.busqueda = (
                    ticket.numero + ' ' +
                    ticket.categoria + ' ' +
                    ticket.sector + ' ' +
                    ticket.ubicacion
                ).toLowerCase();


                tarjeta.innerHTML = `

                    <div class="ticket-header">

                        <div>
                            <div class="ticket-number">
                                ${ticket.numero}
                            </div>

                            <div class="ticket-category">
                                ${ticket.categoria}
                            </div>
                        </div>

                        <span class="status ${ticket.estado}">
                            ${obtenerNombreEstado(ticket.estado)}
                        </span>

                    </div>


                    <div class="ticket-info">

                        <div>
                            <strong>📍 Sector:</strong>
                            ${ticket.sector}
                        </div>

                        <div>
                            <strong>🗓️ Fecha:</strong>
                            ${formatearFecha (ticket.creado_en)}
                        </div>

                        <div>
                            <strong>📌 Ubicación:</strong>
                            ${ticket.ubicacion}
                        </div>

                        <div>
                            <strong>🌐 GPS:</strong>
                            ${ticket.latitud}, ${ticket.longitud}
                        </div>
                        
                        ${
                       ticket.brigada_id
                        ?
                        `
        <div>
            <strong>👷 Brigada responsable:</strong>
            ${
                brigadas.find(function(brigada) {
                    return brigada.id === ticket.brigada_id;
                })?.nombre || 'Brigada no encontrada'
            }
        </div>
    `
    :
    ''
}    
                    </div>


                    <div class="ticket-description">
                        <strong>📝 Descripción:</strong><br>
                        ${ticket.descripcion}
                    </div>
                    ${
    ticket.estado === 'pendiente-verificacion' &&
    ticket.foto_resolucion_url
    ?
    `
        <div class="ticket-description">

            <strong>🔍 Trabajo enviado para verificación</strong>

            <br><br>

            <strong>📝 Comentario de la brigada:</strong>
            <br>

            ${
                ticket.comentario_resolucion ||
                'Sin comentario adicional.'
            }

            <br><br>

            <strong>🕒 Completado:</strong>

            ${
                formatearFecha(ticket.completado_en)
            }

        </div>
    `
    :
    ''
}     

                    <div class="ticket-actions">

                        <button
                            class="action-btn map-btn"
                            onclick="verMapa(
                                ${ticket.latitud},
                                ${ticket.longitud}
                            )"
                        >
                            🗺️ Ver ubicación
                        </button>


                        ${
                            ticket.foto_url
                            ?
                            `
                            <button
                                class="action-btn photo-btn"
                                onclick="verFoto('${ticket.foto_url}')"
                            >
                                📸 Ver evidencia
                            </button>
                            `
                            :
                            ''
                        }


                        
                        
                        ${
    ticket.estado === 'recibido'
    ?
    `
        <select
            id="brigada-${ticket.id}"
            class="status-select"
        >
            <option value="">
                👷 Seleccionar brigada
            </option>

            ${
                brigadas.map(function(brigada) {

                    return `
                        <option value="${brigada.id}">
                            ${brigada.nombre}
                        </option>
                    `;

                }).join('')
            }

        </select>

        <button
            class="action-btn"
            onclick="asignarBrigada(
                ${ticket.id},
                '${ticket.numero}'
            )"
        >
            👷 Asignar ticket
        </button>
    `
    :
    ''
}
            ${
    ticket.estado === 'pendiente-verificacion'
    ?
    `
        <button
            class="action-btn photo-btn"
            onclick="
                verFotoResolucion(
                    '${ticket.foto_resolucion_url}'
                )
            "
        >
            📸 Ver trabajo terminado
        </button>

        <button
            class="action-btn aprobar-btn"
            onclick="
                aprobarResolucion(
                    ${ticket.id},
                    '${ticket.numero}'
                )
            "
        >
            ✅ Aprobar y cerrar
        </button>

        <button
            class="action-btn devolver-btn"
            onclick="
                devolverABrigada(
                    ${ticket.id},
                    '${ticket.numero}'
                )
            "
        >
            ↩️ Devolver a brigada
        </button>
    `
    :
    ''
}

                    </div>
                `;

                contenedor.appendChild(tarjeta);
            });
        }

// =====================================================
// 👷 ASIGNAR BRIGADA A UN TICKET
// Por ahora únicamente comprueba qué brigada seleccionó
// el administrador. En el próximo paso guardaremos la
// asignación permanentemente en Supabase.
// =====================================================

// =====================================================
// 👷 ASIGNAR BRIGADA A UN TICKET
// Guarda la brigada responsable en Supabase y cambia
// automáticamente el estado del ticket a "asignado".
// =====================================================

async function asignarBrigada(ticketId, numeroTicket) {

    // -------------------------------------------------
    // OBTENER EL SELECTOR DEL TICKET
    // -------------------------------------------------

    const selector = document.getElementById(
        'brigada-' + ticketId
    );


    // -------------------------------------------------
    // VERIFICAR QUE SE HAYA SELECCIONADO UNA BRIGADA
    // -------------------------------------------------

    if (!selector || !selector.value) {

        alert(
            'Selecciona una brigada antes de asignar el ticket.'
        );

        return;
    }


    // -------------------------------------------------
    // IDENTIFICAR LA BRIGADA SELECCIONADA
    // -------------------------------------------------

    const brigadaId = Number(selector.value);

    const brigadaSeleccionada = brigadas.find(
        function(brigada) {
            return brigada.id === brigadaId;
        }
    );


    if (!brigadaSeleccionada) {

        alert(
            'No fue posible identificar la brigada seleccionada.'
        );

        return;
    }


    try {

        // -------------------------------------------------
        // GUARDAR ASIGNACIÓN Y NUEVO ESTADO EN SUPABASE
        // -------------------------------------------------

        const { error } = await supabaseClient
    .from('tickets')
    .update({
        brigada_id: brigadaId,
        estado: 'asignado'
    })
    .eq('id', ticketId)
    .eq('municipio_id', 1)
    .eq('estado', 'recibido');


        // -------------------------------------------------
        // COMPROBAR SI OCURRIÓ UN ERROR
        // -------------------------------------------------

        if (error) {

            console.error(
                '❌ Error al asignar brigada:',
                error
            );

            alert(
                'No fue posible asignar la brigada.'
            );

            return;
        }


        // -------------------------------------------------
        // CONFIRMACIÓN
        // -------------------------------------------------

        alert(
            'Ticket ' +
            numeroTicket +
            ' asignado correctamente a ' +
            brigadaSeleccionada.nombre +
            '.'
        );


        // -------------------------------------------------
        // RECARGAR TICKETS DESDE SUPABASE
        // Esto garantiza que el panel muestre los datos
        // reales guardados en la base de datos.
        // -------------------------------------------------

        await cargarTicketsDesdeSupabase();


    } catch (error) {

        console.error(
            '❌ Error inesperado al asignar brigada:',
            error
        );

        alert(
            'Ocurrió un error inesperado al asignar la brigada.'
        );
    }
}

    
        // =====================================================
        // 🚦 CAMBIAR ESTADO DE UN TICKET
        // Actualiza temporalmente el estado seleccionado.
        // Más adelante guardará el cambio en la base de datos.
        // =====================================================

        function cambiarEstado(numeroTicket, nuevoEstado) {

            const ticket = tickets.find(function(item) {
                return item.numero === numeroTicket;
            });

            if (!ticket) {
                return;
            }

            ticket.estado = nuevoEstado;

            mostrarTickets();
            actualizarEstadisticas();
        }


        // =====================================================
        // 📊 ACTUALIZAR ESTADÍSTICAS
        // Recalcula automáticamente las tarjetas superiores.
        // =====================================================

        function actualizarEstadisticas() {

            document.getElementById('totalTickets').textContent =
                tickets.length;

            document.getElementById('ticketsRecibidos').textContent =
                tickets.filter(function(ticket) {
                    return ticket.estado === 'recibido';
                }).length;

            document.getElementById('ticketsProceso').textContent =
                tickets.filter(function(ticket) {
                    return (
                        ticket.estado === 'asignado' ||
                        ticket.estado === 'en-proceso'
                    );
                }).length;

            document.getElementById('ticketsResueltos').textContent =
                tickets.filter(function(ticket) {
                    return ticket.estado === 'resuelto';
                }).length;
        }


        // =====================================================
        // 🔍 FILTRAR TICKETS POR ESTADO
        // Permite mostrar todos o únicamente los tickets que
        // coincidan con el estado seleccionado.
        // =====================================================

        function filtrarTickets(estado, boton) {

            document
                .querySelectorAll('.filter-btn')
                .forEach(function(btn) {
                    btn.classList.remove('active');
                });

            boton.classList.add('active');

            if (estado === 'todos') {
                mostrarTickets(tickets);
                return;
            }

            const filtrados = tickets.filter(function(ticket) {
                return ticket.estado === estado;
            });

            mostrarTickets(filtrados);
        }


        // =====================================================
        // 🔎 BUSCAR TICKETS
        // Busca coincidencias por número, categoría, sector
        // o ubicación.
        // =====================================================

        function buscarTickets() {

            const texto = document
                .getElementById('searchInput')
                .value
                .toLowerCase()
                .trim();

            const resultados = tickets.filter(function(ticket) {

                const contenido = (
                    ticket.numero + ' ' +
                    ticket.categoria + ' ' +
                    ticket.sector + ' ' +
                    ticket.ubicacion
                ).toLowerCase();

                return contenido.includes(texto);
            });

            mostrarTickets(resultados);
        }


        // =====================================================
        // 🗺️ VER UBICACIÓN EN MAPA
        // Abre las coordenadas GPS del ticket en Google Maps.
        // =====================================================

        function verMapa(latitud, longitud) {

            const url =
                'https://www.google.com/maps?q=' +
                latitud +
                ',' +
                longitud;

            window.open(url, '_blank');
        }


        // =====================================================
// 📸 VER EVIDENCIA FOTOGRÁFICA
// Genera temporalmente una URL firmada para acceder a
// una evidencia almacenada en un bucket privado.
// =====================================================

// =====================================================
// 📸 VER EVIDENCIA FOTOGRÁFICA
// Descarga temporalmente la imagen desde Supabase
// Storage y la abre en una nueva pestaña.
// =====================================================

async function verFoto(rutaFoto) {

    try {

        const rutaLimpia = rutaFoto.trim();

        console.log(
            '📸 Intentando abrir evidencia:',
            rutaLimpia
        );

        const { data, error } = await supabaseClient
            .storage
            .from('evidencias-tickets')
            .download(rutaLimpia);


        if (error) {

            console.error(
                '❌ Error al descargar evidencia:',
                error
            );

            alert(
                'No fue posible abrir la evidencia fotográfica.'
            );

            return;
        }


        // Crear una URL temporal en el navegador
        // usando el archivo descargado.

        const urlTemporal = URL.createObjectURL(data);

        window.open(
            urlTemporal,
            '_blank'
        );


        console.log(
            '✅ Evidencia abierta correctamente.'
        );


    } catch (error) {

        console.error(
            '❌ Error inesperado al abrir evidencia:',
            error
        );

        alert(
            'Ocurrió un error al intentar abrir la evidencia.'
        );
    }
}

// =====================================================
// 📸 VER EVIDENCIA DEL TRABAJO TERMINADO
// Descarga la fotografía enviada por la brigada desde
// el bucket privado de evidencias de resolución.
// =====================================================

async function verFotoResolucion(rutaFoto) {

    try {

        if (!rutaFoto) {

            alert(
                'Este ticket no tiene evidencia de resolución.'
            );

            return;
        }


        const rutaLimpia = rutaFoto.trim();


        const { data, error } = await supabaseClient
            .storage
            .from('evidencias-resoluciones')
            .download(rutaLimpia);


        if (error) {

            console.error(
                '❌ Error al abrir evidencia de resolución:',
                error
            );

            alert(
                'No fue posible abrir la evidencia del trabajo terminado.'
            );

            return;
        }


        const urlTemporal = URL.createObjectURL(data);


        window.open(
            urlTemporal,
            '_blank'
        );


    } catch (error) {

        console.error(
            '❌ Error inesperado al abrir evidencia de resolución:',
            error
        );

        alert(
            'Ocurrió un error al abrir la evidencia del trabajo terminado.'
        );
    }
}


// =====================================================
// ✅ APROBAR RESOLUCIÓN Y CERRAR TICKET
// Permite al administrador confirmar que el trabajo fue
// realizado correctamente y marcar el ticket como resuelto.
// =====================================================

async function aprobarResolucion(ticketId, numeroTicket) {

    const confirmar = confirm(
        '¿Confirmas que el trabajo del ticket ' +
        numeroTicket +
        ' fue realizado correctamente y deseas cerrarlo?'
    );


    if (!confirmar) {
        return;
    }


    try {

        const { error } = await supabaseClient
    .from('tickets')
    .update({
        estado: 'resuelto'
    })
    .eq('id', ticketId)
    .eq('municipio_id', 1)
    .eq('estado', 'pendiente-verificacion');


        if (error) {

            console.error(
                '❌ Error al aprobar resolución:',
                error
            );

            alert(
                'No fue posible aprobar y cerrar el ticket.'
            );

            return;
        }


        alert(
            'Ticket ' +
            numeroTicket +
            ' aprobado y cerrado correctamente.'
        );


        await cargarTicketsDesdeSupabase();


    } catch (error) {

        console.error(
            '❌ Error inesperado al aprobar resolución:',
            error
        );

        alert(
            'Ocurrió un error inesperado al cerrar el ticket.'
        );
    }
}


// =====================================================
// ↩️ DEVOLVER TICKET A LA BRIGADA
// Devuelve el ticket al estado "en-proceso" para que la
// brigada corrija o complete nuevamente el trabajo.
// =====================================================

async function devolverABrigada(ticketId, numeroTicket) {

    const motivo = prompt(
        'Escribe el motivo por el que se devuelve el ticket ' +
        numeroTicket +
        ' a la brigada:'
    );


    if (motivo === null) {
        return;
    }


    if (!motivo.trim()) {

        alert(
            'Debes indicar un motivo para devolver el ticket.'
        );

        return;
    }


    try {

        const { data, error } = await supabaseClient
    .from('tickets')
    .update({
        estado: 'en-proceso',
        motivo_devolucion: motivo.trim()
    })
    .eq('id', ticketId)
    .eq('municipio_id', 1)
    .eq('estado', 'pendiente-verificacion')
    .select();

    console.log('Resultado devolución:', data);
    console.log('Error devolución:', error);

        if (error) {

            console.error(
                '❌ Error al devolver ticket:',
                error
            );

            alert(
                'No fue posible devolver el ticket a la brigada.'
            );

            return;
        }


        alert(
            'Ticket ' +
            numeroTicket +
            ' devuelto a la brigada.'
        );


        await cargarTicketsDesdeSupabase();


    } catch (error) {

        console.error(
            '❌ Error inesperado al devolver ticket:',
            error
        );

        alert(
            'Ocurrió un error inesperado al devolver el ticket.'
        );
    }
}

inicializarPanel();
